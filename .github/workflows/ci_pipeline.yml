name: OOB NumPy Testing Pipeline

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: pip install -r requirements.txt

      - name: Build NumPy from source
        run: python scripts/build_numpy.py

      - name: Run functional tests
        run: pytest tests/functional/ -v

      - name: Run performance tests
        run: pytest tests/performance/ -v --benchmark-autosave

      - name: Display test summary
        if: always()
        run: |
          echo "========================================"
          echo "        OOB NumPy Test Summary          "
          echo "========================================"
          pytest tests/ --tb=no -q || true
